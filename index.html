<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoachSir Institute</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b1f3a;
color:white;
display:flex;
justify-content:center;
padding:25px;
}

.card{

max-width:420px;
width:100%;
background:#142c52;
border-radius:20px;
padding:30px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.4);

}

.logo{

width:120px;
height:120px;
border-radius:50%;
border:4px solid orange;
object-fit:cover;

}

h1{

margin-top:15px;
color:orange;

}

.tagline{

margin-top:8px;
color:#ddd;
font-size:15px;

}

</style>

</head>

<body>

<div class="card">

<img src="logo.png" alt="coachsir logo" class="logo">

<h1>CoachSir Institute</h1>

<p class="tagline">

Learn Skills. Build Careers.

</p>

</div>
  
</body>
  
</html>
